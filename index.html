<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FFT PSX Vera — Tactical Save Companion &amp; Party Ledger</title>
    <meta name="description" content="A tactical fantasy companion terminal. Upload a save, parse the truth of your party and inventory, and talk to your roster grounded in the actual save state." />
    <meta name="theme-color" content="#0a0e14" />
    <link rel="icon" type="image/svg+xml" href="/fftpsxvera-icon.svg" />
    <script>
      // Apply the saved theme before paint to avoid a flash (default: Obsidian/dark).
      try {
        var t = localStorage.getItem('fftvera-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      } catch (e) {}
    </script>
    <!-- Cinzel (display/inscriptions), Crimson Text (storybook serif), Inter (UI), JetBrains Mono (ledger figures) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
