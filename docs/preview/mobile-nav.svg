    <linearGradient id="br" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f0d690"/><stop offset="48%" stop-color="#c9a24b"/><stop offset="100%" stop-color="#8a6d2e"/></linearGradient>
    <clipPath id="screen"><rect x="18" y="18" width="364" height="784" rx="26"/></clipPath>
