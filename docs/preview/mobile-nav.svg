    <line x1="18" y1="64" x2="382" y2="64" stroke="#232c3d"/>
    <rect x="30" y="29" width="26" height="24" rx="6" fill="#1b2233" stroke="#232c3d"/>
    <g stroke="#d8b25a" stroke-width="1.6"><line x1="36" y1="37" x2="50" y2="37"/><line x1="36" y1="41" x2="50" y2="41"/><line x1="36" y1="45" x2="50" y2="45"/></g>
