    <!-- the drawer (now openable!) -->
    <rect x="18" y="18" width="232" height="784" fill="#0c111b"/>
    <line x1="250" y1="18" x2="250" y2="802" stroke="#232c3d"/>
    <g transform="translate(34,30) scale(0.5)"><use href="#sg"/></g>
    <text x="70" y="44" fill="#f5efe0" font-family="Georgia, serif" font-size="14" font-weight="700" letter-spacing="1">FFT PSX VERA</text>
    <text x="70" y="58" fill="#c9a24b" font-family="monospace" font-size="7.5" letter-spacing="2">SAVE COMPANION</text>
