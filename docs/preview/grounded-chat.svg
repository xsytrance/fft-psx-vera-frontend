<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="700" fill="#0a0e14"/>

  <!-- header -->
  <rect x="0" y="0" width="900" height="60" fill="#0f131d"/>
  <line x1="0" y1="60" x2="900" y2="60" stroke="#232c3d"/>
  <g transform="translate(20,18)"><rect width="64" height="26" rx="7" fill="rgba(255,255,255,0.02)" stroke="#232c3d"/><text x="32" y="17" fill="#9aa3b4" font-size="11" text-anchor="middle">← Back</text></g>
  <circle cx="108" cy="30" r="17" fill="#1a2233" stroke="#c9a24b" stroke-opacity="0.4"/><text x="108" y="35" fill="#d8b25a" font-family="Georgia, serif" font-size="14" text-anchor="middle">S</text>
  <text x="134" y="27" fill="#f5efe0" font-family="Georgia, serif" font-size="15" font-weight="700">Sera Wynn</text>
  <text x="134" y="44" fill="#687387" font-size="11">Warden · Lv.34 Warden</text>

  <!-- grounding strip (aether) -->
  <rect x="0" y="61" width="900" height="76" fill="#0c1a1a" fill-opacity="0.5"/>
  <rect x="0" y="61" width="900" height="76" fill="#4fd1c5" fill-opacity="0.04"/>
  <line x1="0" y1="137" x2="900" y2="137" stroke="#232c3d"/>
  <g transform="translate(20,78)">
    <path d="M7 0 L14 3 V8 C14 12 11 15 7 16 C3 15 0 12 0 8 V3 Z" fill="none" stroke="#4fd1c5" stroke-width="1.4"/>
    <text x="24" y="12" fill="#4fd1c5" font-family="monospace" font-size="11.5">Grounded in your save — Lv.34 Warden · 4 equipped</text>
    <text x="848" y="12" fill="#4fd1c5" font-size="11" opacity="0.6">▴</text>
    <g transform="translate(0,24)" font-size="10.5" font-family="monospace">
      <g><rect width="200" height="26" rx="6" fill="#0f131d" stroke="#232c3d"/><text x="10" y="17"><tspan fill="#687387">right hand</tspan> <tspan fill="#e9e2d2">Bronze Saber</tspan></text></g>
      <g transform="translate(210,0)"><rect width="200" height="26" rx="6" fill="#0f131d" stroke="#232c3d"/><text x="10" y="17"><tspan fill="#687387">head</tspan> <tspan fill="#e9e2d2">Iron Circlet</tspan></text></g>
      <g transform="translate(420,0)"><rect width="200" height="26" rx="6" fill="#0f131d" stroke="#232c3d"/><text x="10" y="17"><tspan fill="#687387">body</tspan> <tspan fill="#e9e2d2">Wardens' Mail</tspan></text></g>
      <g transform="translate(630,0)"><rect width="200" height="26" rx="6" fill="#0f131d" stroke="#232c3d"/><text x="10" y="17"><tspan fill="#687387">accessory</tspan> <tspan fill="#e9e2d2">Oath Charm</tspan></text></g>
    </g>
  </g>

  <!-- thread -->
  <g transform="translate(220,165)">
    <!-- user message (right) -->
    <g transform="translate(150,0)">
      <rect width="310" height="48" rx="14" fill="#243355" stroke="#2f3d5e"/>
      <text x="18" y="22" fill="#e9e2d2" font-size="13">What should I upgrade before the</text>
      <text x="18" y="40" fill="#e9e2d2" font-size="13">mountain pass?</text>
    </g>
    <!-- assistant message (left) with markdown -->
    <g transform="translate(0,70)">
      <circle cx="-30" cy="20" r="15" fill="#1a2233" stroke="#232c3d"/><text x="-30" y="25" fill="#d8b25a" font-family="Georgia, serif" font-size="13" text-anchor="middle">S</text>
      <rect width="460" height="184" rx="14" fill="#141925" stroke="#232c3d"/>
      <text x="18" y="26" fill="#c9a24b" font-family="Georgia, serif" font-size="12" font-weight="700">Sera Wynn</text>
      <text x="18" y="50" fill="#e9e2d2" font-size="13">Your <tspan fill="#f5efe0" font-weight="700">Bronze Saber</tspan> has carried us far, but</text>
      <text x="18" y="68" fill="#e9e2d2" font-size="13">the pass will test our armor. I'd see to:</text>
      <g font-size="13" fill="#e9e2d2">
        <text x="30" y="92">•  a sturdier helm than the <tspan fill="#f5efe0" font-weight="700">Iron Circlet</tspan></text>
        <text x="30" y="112">•  a cold-ward charm for the heights</text>
      </g>
      <line x1="18" y1="128" x2="442" y2="128" stroke="#c9a24b" stroke-opacity="0.14"/>
      <text x="18" y="148" fill="#9aa3b4" font-size="12" font-style="italic">I speak only of what your save confirms.</text>
      <!-- actions -->
      <g transform="translate(18,160)" font-family="monospace" font-size="10">
        <g><path d="M2 2 h8 v8 M0 4 h8 v8 h-8 Z" fill="none" stroke="#687387" stroke-width="1"/><text x="14" y="9" fill="#687387">Copy</text></g>
        <g transform="translate(70,0)"><path d="M2 5 a5 5 0 1 1 1 3 M2 2 v3 h3" fill="none" stroke="#687387" stroke-width="1"/><text x="14" y="9" fill="#687387">Regenerate</text></g>
      </g>
    </g>
  </g>

  <!-- composer -->
  <line x1="0" y1="624" x2="900" y2="624" stroke="#232c3d"/>
  <rect x="0" y="624" width="900" height="76" fill="#0f131d"/>
  <g transform="translate(220,640)">
    <rect width="406" height="44" rx="12" fill="#0c1019" stroke="#c9a24b" stroke-opacity="0.35"/>
    <text x="14" y="27" fill="#687387" font-size="13">Message Sera Wynn…  (Shift+Enter for newline)</text>
    <g transform="translate(418,0)"><rect width="44" height="44" rx="8" fill="#c9a24b"/><path d="M14 22 h16 M24 16 l8 6 -8 6" stroke="#1a1407" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
</svg>
